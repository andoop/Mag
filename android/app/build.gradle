def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def readLocalString = { Properties props, String key, String defaultValue = '' ->
    def value = props.getProperty(key)
    return value == null ? defaultValue : value.trim()
}

def readLocalInt = { Properties props, String key, int defaultValue ->
    def value = props.getProperty(key)
    if (value == null || value.trim().isEmpty()) {
        return defaultValue
    }
    try {
        return Integer.parseInt(value.trim())
    } catch (ignored) {
        return defaultValue
    }
}

def readLocalBoolean = { Properties props, String key, boolean defaultValue = false ->
    def value = props.getProperty(key)
    if (value == null) {
        return defaultValue
    }
    def normalized = value.trim().toLowerCase(Locale.ROOT)
    return normalized == 'true' || normalized == '1' || normalized == 'yes'
}

def quoteForBuildConfig = { String value ->
    def escaped = value
        .replace("\\", "\\\\")
        .replace("\"", "\\\"")
    return "\"${escaped}\""
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

def releaseStoreFile = keyProperties.getProperty('storeFile')
def hasReleaseSigning =
        releaseStoreFile != null &&
        !releaseStoreFile.trim().isEmpty() &&
        rootProject.file(releaseStoreFile).exists() &&
        keyProperties.getProperty('storePassword') != null &&
        keyProperties.getProperty('keyAlias') != null &&
        keyProperties.getProperty('keyPassword') != null

print("###################################hasReleaseSigning: " + hasReleaseSigning)
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new RuntimeException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def analyticsProvider = readLocalString(localProperties, 'mag.analytics.provider', '')
def analyticsSensorsServerUrl = readLocalString(localProperties, 'mag.analytics.sensors.serverUrl', '')
def analyticsSensorsEnableLog = readLocalBoolean(localProperties, 'mag.analytics.sensors.enableLog', false)
def analyticsSensorsFlushIntervalMs = readLocalInt(localProperties, 'mag.analytics.sensors.flushIntervalMs', 15000)
def analyticsSensorsFlushBulkSize = readLocalInt(localProperties, 'mag.analytics.sensors.flushBulkSize', 100)
def analyticsCustomServerUrl = readLocalString(localProperties, 'mag.analytics.custom.serverUrl', '')
def analyticsCustomApiKey = readLocalString(localProperties, 'mag.analytics.custom.apiKey', '')
def analyticsCustomApiKeyHeader = readLocalString(localProperties, 'mag.analytics.custom.apiKeyHeader', 'x-api-key')
def analyticsChannel = readLocalString(localProperties, 'mag.analytics.channel', '')
def analyticsGrayGroup = readLocalString(localProperties, 'mag.analytics.grayGroup', '')
def analyticsIsInternalUser = readLocalBoolean(localProperties, 'mag.analytics.isInternalUser', false)

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.magent.mobile_agent"
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile rootProject.file(releaseStoreFile)
                storePassword keyProperties.getProperty('storePassword')
                keyAlias keyProperties.getProperty('keyAlias')
                keyPassword keyProperties.getProperty('keyPassword')
            }
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.magent.mobile_agent"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 21
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        buildConfigField "String", "MAG_ANALYTICS_PROVIDER", quoteForBuildConfig(analyticsProvider)
        buildConfigField "String", "MAG_ANALYTICS_SENSORS_SERVER_URL", quoteForBuildConfig(analyticsSensorsServerUrl)
        buildConfigField "boolean", "MAG_ANALYTICS_SENSORS_ENABLE_LOG", analyticsSensorsEnableLog.toString()
        buildConfigField "int", "MAG_ANALYTICS_SENSORS_FLUSH_INTERVAL_MS", analyticsSensorsFlushIntervalMs.toString()
        buildConfigField "int", "MAG_ANALYTICS_SENSORS_FLUSH_BULK_SIZE", analyticsSensorsFlushBulkSize.toString()
        buildConfigField "String", "MAG_ANALYTICS_CUSTOM_SERVER_URL", quoteForBuildConfig(analyticsCustomServerUrl)
        buildConfigField "String", "MAG_ANALYTICS_CUSTOM_API_KEY", quoteForBuildConfig(analyticsCustomApiKey)
        buildConfigField "String", "MAG_ANALYTICS_CUSTOM_API_KEY_HEADER", quoteForBuildConfig(analyticsCustomApiKeyHeader)
        buildConfigField "String", "MAG_ANALYTICS_CHANNEL", quoteForBuildConfig(analyticsChannel)
        buildConfigField "String", "MAG_ANALYTICS_GRAY_GROUP", quoteForBuildConfig(analyticsGrayGroup)
        buildConfigField "boolean", "MAG_ANALYTICS_IS_INTERNAL_USER", analyticsIsInternalUser.toString()
    }

    packagingOptions {
        resources {
            excludes += ['plugin.properties']
            excludes += ['META-INF/DEPENDENCIES']
        }
    }

    buildTypes {
        debug {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
        release {
            // Prefer a real release keystore when android/key.properties is present.
            // Fallback to the debug key so local release builds still work on fresh clones.
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "io.noties.markwon:core:4.6.2"
    implementation "io.noties.markwon:ext-tables:4.6.2"
    implementation "androidx.documentfile:documentfile:1.0.1"
    implementation "org.eclipse.jgit:org.eclipse.jgit:5.13.1.202206130422-r"
    implementation("org.eclipse.jgit:org.eclipse.jgit.ssh.apache:5.13.1.202206130422-r") {
        exclude group: "org.apache.sshd", module: "sshd-osgi"
    }
}
