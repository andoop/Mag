name: git_on_dart
description: Pure Dart git implementation optimized for Flutter mobile apps. Provides local and remote git operations (init, commit, push, pull, merge, rebase) with HTTPS/SSH authentication.
version: 0.1.4
repository: https://github.com/sojankreji/git-in-dart
issue_tracker: https://github.com/sojankreji/git-in-dart/issues
homepage: https://github.com/sojankreji/git-in-dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # Core utilities
  path: ^1.9.0
  
  # Cryptographic functions (SHA-1 hashing)
  crypto: ^3.0.3
  
  # Compression (zlib/deflate)
  archive: ^3.4.0
  
  # Platform-specific paths (for Flutter integration)
  path_provider: ^2.1.0
  
  # SSH client for remote operations
  dartssh2: ^2.12.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0

# Ensure package works on all platforms
platforms:
  android:
  ios:
  linux:
  macos:
  windows:
